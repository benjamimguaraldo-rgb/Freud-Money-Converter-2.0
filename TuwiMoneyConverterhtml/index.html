<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuwi Convertedor de dinheiro</title>
    <link rel="stylesheet" href="visual.css">
</head>
<body>
    <h1 class="titulo">Tuwi Systems : Calculadora de Moedas!</h1>
    <div class="divprincipal">
        <h1>Convertedor</h1>
        
        <label for="moeda-origem">De : </label>

        <select id="moeda-origem" class="sec">
            <option value="" selected>Selecione a moeda...</option>
            <option value="EUR">Euros</option>
            <option value="USD">Dólar</option>
            <option value="BRL">Real</option>
            <option value="JPY">Ienes</option>
        </select>
        
        
        
        <label for="moeda-destino">Para : </label>
        
        <select id="moeda-destino" class="sec">
            <option value="" selected>Selecione a moeda...</option>
            <option value="EUR">Euros</option>
            <option value="USD">Dólar</option>
            <option value="BRL">Real</option>
            <option value="JPY">Ienes</option>
        
        </select><br><br>

        <label for="de">Valor incial : </label>
        <input type="number" name="de" id="de" placeholder="Ex: 130.54" step="0.01" min="0">

        <label for="resultado">resultado : </label>
        <input type="text" name="resultado" id="resultado" readonly placeholder="aguardando...">
     
        <br><br>

       <button id="botao" class="converterbutton">Converter</button>

    </div>
    <script src="interação.js"></script>
</body>
</html>
